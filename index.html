
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Ready Analyzer</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Ready Analyzer</h1>
      <p>企業名と部署名から、生成AI向けプロンプトを自動生成</p>
    </header>

    <section class="card">
      <div class="grid">
        <div>
          <label>企業名</label>
          <input type="text" id="company" placeholder="例: 日立製作所">
        </div>

        <div>
          <label>部署名</label>
          <input type="text" id="department" placeholder="例: 経理部">
        </div>

        <div>
          <label>業界</label>
          <input type="text" id="industry" placeholder="例: 製造業">
        </div>

        <div>
          <label>企業規模</label>
          <select id="size">
            <option>大企業</option>
            <option>中堅企業</option>
            <option>中小企業</option>
          </select>
        </div>
      </div>

      <button id="generatePromptBtn">プロンプト生成</button>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>生成プロンプト</h2>
        <button id="copyPromptBtn">コピー</button>
      </div>

      <textarea id="promptOutput"></textarea>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>JSON貼り付け</h2>
        <button id="loadJsonBtn">解析</button>
      </div>

      <textarea id="jsonInput" placeholder='ここに生成AIのJSONを貼り付け'></textarea>
    </section>

    <section class="card hidden" id="resultSection">
      <div class="section-header">
        <h2>分析結果</h2>
        <button id="downloadBtn">JSON保存</button>
      </div>

      <div class="score-box">
        <div>
          <span>総合AI化率</span>
          <strong id="totalScore">0</strong>
        </div>
      </div>

      <canvas id="radarChart"></canvas>

      <div id="taskList"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
